name: MacOS

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/macos.yaml"
      - "setup.sh"
      - "install/macos/**"
      - "home/.chezmoiscripts/macos/**"
      - "home/dot_tmux.conf.d/os/macos.conf"
      - "tests/install/macos/**"

  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/macos.yaml"
      - "setup.sh"
      - "install/macos/**"
      - "home/.chezmoiscripts/macos/**"
      - "home/dot_tmux.conf.d/os/macos.conf"
      - "tests/install/macos/**"

jobs:
  build:
    runs-on: macos-14 # M1 Mac
    env:
      # DOTFILES_DEBUG: 1
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      HAS_PRIVATE_DOTFILES_KEY: ${{ secrets.PRIVATE_DOTFILES_PRIVATE_DEPLOY_KEY != '' }}
      HAS_EMAIL_ADDRESS: ${{ secrets.EMAIL_ADDRESS != '' }}
      HAS_BENCHMARK_TOKEN: ${{ secrets.MY_DOTFILES_BENCHMARK != '' }}

    steps:
      - name: Explain skipped private integration
        if: ${{ env.HAS_PRIVATE_DOTFILES_KEY != 'true' || env.HAS_EMAIL_ADDRESS != 'true' }}
        run: |
          echo "Skipping macOS private dotfiles integration because required repository secrets are not configured."

      - name: Set up SSH agent and add the private deploy key for the private dotfiles repo
        if: ${{ env.HAS_PRIVATE_DOTFILES_KEY == 'true' && env.HAS_EMAIL_ADDRESS == 'true' }}
        uses: webfactory/ssh-agent@v0.10.0
        with:
          ssh-private-key: ${{ secrets.PRIVATE_DOTFILES_PRIVATE_DEPLOY_KEY }}

      - name: Setup dotfiles
        if: ${{ env.HAS_PRIVATE_DOTFILES_KEY == 'true' && env.HAS_EMAIL_ADDRESS == 'true' }}
        env:
          EMAIL_ADDRESS: ${{ secrets.EMAIL_ADDRESS }}
          EVENT_NAME: ${{ github.event_name }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # for avoiding rate limit of GitHub API
        run: |
          if [ "${EVENT_NAME}" == "push" ]; then
            BRANCH_NAME="${{ github.ref_name }}"
          elif [ "${EVENT_NAME}" == "pull_request" ]; then
            BRANCH_NAME="${{ github.head_ref }}"
          fi
          export BRANCH_NAME

          URL="https://raw.githubusercontent.com/mryfmo/dotfiles/${BRANCH_NAME}/setup.sh"
          echo "Download setup.sh from ${URL}"

          printf "${EMAIL_ADDRESS}\n" | bash -c "$(curl -fsLS $URL)"
          #              │
          #              └─ Simulate inputting an email address into the chezmoi's config.

      - name: Re-run setup after modifying .zprofile
        if: ${{ env.HAS_PRIVATE_DOTFILES_KEY == 'true' && env.HAS_EMAIL_ADDRESS == 'true' }}
        env:
          EMAIL_ADDRESS: ${{ secrets.EMAIL_ADDRESS }}
          EVENT_NAME: ${{ github.event_name }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # for avoiding rate limit of GitHub API
        run: |
          if [ "${EVENT_NAME}" == "push" ]; then
            BRANCH_NAME="${{ github.ref_name }}"
          elif [ "${EVENT_NAME}" == "pull_request" ]; then
            BRANCH_NAME="${{ github.head_ref }}"
          fi
          export BRANCH_NAME

          URL="https://raw.githubusercontent.com/mryfmo/dotfiles/${BRANCH_NAME}/setup.sh"
          echo "Download setup.sh from ${URL}"

          # Simulate a target changed after chezmoi last wrote it. The bootstrap
          # must force apply and must not stop on an overwrite prompt.
          printf '\n# CI local change after chezmoi apply\n' >> "${HOME}/.zprofile"
          printf "${EMAIL_ADDRESS}\n" | bash -c "$(curl -fsLS $URL)"

      - name: Unset gpg
        if: ${{ env.HAS_PRIVATE_DOTFILES_KEY == 'true' && env.HAS_EMAIL_ADDRESS == 'true' }}
        run: |
          git config --global commit.gpgsign false

      - name: Run benchmark
        if: ${{ env.HAS_PRIVATE_DOTFILES_KEY == 'true' && env.HAS_EMAIL_ADDRESS == 'true' }}
        run: |
          brew install gnu-time chezmoi
          $(chezmoi source-path)/../scripts/run_benchmark.sh > result.json

      - name: Dump result.json
        if: ${{ env.HAS_PRIVATE_DOTFILES_KEY == 'true' && env.HAS_EMAIL_ADDRESS == 'true' }}
        run: cat result.json

      - name: Set flag for auto-push in the benchmark action
        if: ${{ env.HAS_PRIVATE_DOTFILES_KEY == 'true' && env.HAS_EMAIL_ADDRESS == 'true' }}
        run: |
          if [ "${{ github.event_name }}" = "push" ] && [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "auto_push=true" >> $GITHUB_ENV
          else
            echo "auto_push=false" >> $GITHUB_ENV
          fi

      - name: Store benchmark result
        if: ${{ env.HAS_PRIVATE_DOTFILES_KEY == 'true' && env.HAS_EMAIL_ADDRESS == 'true' && env.HAS_BENCHMARK_TOKEN == 'true' }}
        uses: benchmark-action/github-action-benchmark@v1
        with:
          name: MacOS benchmark
          tool: customSmallerIsBetter
          output-file-path: result.json
          github-token: ${{ secrets.MY_DOTFILES_BENCHMARK }}
          gh-repository: "github.com/mryfmo/my-dotfiles-benchmarks"
          auto-push: ${{ env.auto_push }}
          comment-on-alert: true
          fail-on-alert: false
          alert-threshold: "150%"
          alert-comment-cc-users: "@mryfmo"
          benchmark-data-dir-path: "."

      - uses: jdx/mise-action@v4
        if: ${{ env.HAS_PRIVATE_DOTFILES_KEY == 'true' && env.HAS_EMAIL_ADDRESS == 'true' }}
        with:
          install: true
          cache: true

      - name: Test file existence
        if: ${{ env.HAS_PRIVATE_DOTFILES_KEY == 'true' && env.HAS_EMAIL_ADDRESS == 'true' }}
        run: |
          brew install bats-core

          cd $(chezmoi source-path)/../
          bats --print-output-on-failure \
            tests/files/common.bats \
            tests/files/macos.bats
