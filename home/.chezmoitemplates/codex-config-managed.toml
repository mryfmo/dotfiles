#:schema https://developers.openai.com/codex/config-schema.json
# Codex CLI user configuration managed by chezmoi.
# Generated from home/dot_agents/agent-config.yaml by scripts/generate-agent-configs.py.
# Keep secrets and OAuth state out of this file; use environment variables or
# Codex-managed credential storage for MCP authentication.

model = "gpt-5.6-sol"
model_reasoning_effort = "high"
approval_policy = "on-request"
sandbox_mode = "workspace-write"
web_search = "cached"
project_doc_max_bytes = 65536
project_doc_fallback_filenames = ["CLAUDE.md"]

[tui]
status_line = ["model-with-reasoning", "context-remaining", "used-tokens", "total-input-tokens", "total-output-tokens", "five-hour-limit", "weekly-limit", "git-branch"]

[tui.model_availability_nux]
"gpt-5.6-sol" = 2

[sandbox_workspace_write]
network_access = false
writable_roots = ["{{ .chezmoi.homeDir }}/.agents/skills/agmsg/db", "{{ .chezmoi.homeDir }}/.agents/skills/agmsg/teams", "{{ .chezmoi.homeDir }}/.agents/skills/agmsg/run"]

[shell_environment_policy]
inherit = "core"
set = { PATH = "{{ .chezmoi.homeDir }}/.local/share/mise/installs/node/lts/bin:{{ .chezmoi.homeDir }}/.local/share/mise/shims:{{ .chezmoi.homeDir }}/.local/bin:/opt/homebrew/bin:/usr/local/bin:/usr/bin:/bin:/usr/sbin:/sbin" }

[mcp_servers.cognee_memory]
url = "http://127.0.0.1:8000/mcp"
enabled = false
required = false
startup_timeout_sec = 60
tool_timeout_sec = 180
enabled_tools = ["recall", "search", "remember", "save_interaction", "cognify_status", "improve"]
disabled_tools = ["prune", "delete", "delete_dataset", "forget_memory"]

[mcp_servers.context7]
command = "npx"
args = ["-y", "@upstash/context7-mcp"]
enabled = false
required = false
startup_timeout_sec = 20
tool_timeout_sec = 60
supports_parallel_tool_calls = true

[mcp_servers.filesystem_dotfiles]
command = "npx"
args = ["-y", "@modelcontextprotocol/server-filesystem", "{{ .chezmoi.sourceDir }}"]
enabled = false
required = false
startup_timeout_sec = 30
tool_timeout_sec = 30

[mcp_servers.github]
command = "docker"
args = ["run", "-i", "--rm", "-e", "GITHUB_PERSONAL_ACCESS_TOKEN", "ghcr.io/github/github-mcp-server"]
enabled = false
required = false
startup_timeout_sec = 60
tool_timeout_sec = 60
enabled_tools = ["list_issues", "get_issue", "search_repositories", "search_code", "list_pull_requests", "get_pull_request"]

[mcp_servers.time]
command = "uvx"
args = ["mcp-server-time"]
enabled = false
required = false
startup_timeout_sec = 30
tool_timeout_sec = 30

[mcp_servers.sequential_thinking]
command = "npx"
args = ["-y", "@modelcontextprotocol/server-sequential-thinking"]
enabled = false
required = false
startup_timeout_sec = 30
tool_timeout_sec = 60

[mcp_servers.playwright]
command = "npx"
args = ["@playwright/mcp@latest"]
enabled = false
required = false
startup_timeout_sec = 60
tool_timeout_sec = 120

[features]
plugins = true
hooks = true
plugin_hooks = true

[plugins."superpowers@openai-curated"]
enabled = true

[plugins."crit@mryfmo-personal-plugins"]
enabled = true

[plugins."ponytail@ponytail"]
enabled = true

[marketplaces.ponytail]
last_updated = "2026-06-30T01:47:41Z"
last_revision = "16f6cbf4b87792938e47b0f8c650b6d80fcbc98c"
source_type = "git"
source = "https://github.com/DietrichGebert/ponytail.git"

[[hooks.PermissionRequest]]
matcher = ""

[[hooks.PermissionRequest.hooks]]
type = "command"
command = "ccgate codex"
statusMessage = "ccgate evaluating request"

