[tools]
# Versions are reviewed and updated only by `make upgrade` with the lock diff.
node = "24.18.0"
rust = "1.96.1"
python = "3.11.15"

age = "1.3.1"
aws-cli = "2.35.21"
bats = "1.13.0"
bun = "1.3.14"
chezmoi = "2.70.5"
cmake = "4.3.3"
dotenvx = "2.1.4"
"cargo:eza" = "0.23.5"
fd = "10.3.0"
gcloud = "575.0.0"
jq = "1.8.2"
hugo-extended = "0.136.5"
uv = "0.11.26"
yazi = "26.5.6"
"github:mikefarah/yq" = "4.53.3"
shellcheck = "0.11.0"
shfmt = "3.13.1"

"npm:@anthropic-ai/claude-code" = "2.1.201"
"npm:@openai/codex" = "0.142.5"
"npm:bash-language-server" = "5.6.0"
"npm:pyright" = "1.1.411"
"npm:fast-cli" = "5.2.0"

"aqua:tak848/ccgate" = "0.9.5"

"github:x-motemen/ghq" = "1.10.1"
"github:d-kuro/gwq" = "0.1.1"
"github:cli/cli" = "2.96.0"
"github:ogulcancelik/herdr" = "0.7.1"
"github:shuntaka9576/blocc" = { version = "0.6.0", os = ["linux/x64"] }

"cargo:pueue" = "4.0.4"

[settings]
idiomatic_version_file_enable_tools = ["python"]
lockfile = true
locked = true
lockfile_platforms = ["linux-x64", "linux-arm64", "macos-x64", "macos-arm64"]

[settings.cargo]
binstall = false
